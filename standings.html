

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Mediocre Disc Golf Fantasy League — Standings</title>
  <link rel="stylesheet" href="assets/style.css" />

  <style>
    /* Visual tweaks to match Stats page emphasis */
    :root { --mdgfl-gold: #f5c542; }

    /* Team header rows: bold + gold text */
    tr.team-row td,
    tr.team-row td strong {
      color: var(--mdgfl-gold) !important;
      font-weight: 800 !important;
    }

    /* Scores excluded by "top 5 per event" rule */
    td.excluded-score {
      text-decoration: line-through;
      opacity: 0.55;
    }
  </style>
</head>

<body>
  <!-- Top ribbon / nav (matches stats.html styling) -->
  <nav class="subnav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="standings.html" class="nav-link">Standings</a>
    <a href="stats.html" class="nav-link">Stats</a>
  </nav>

  <div class="wrap">
    <header class="header">
      <img class="logo-img" src="assets/logo.png" alt="The Mediocre Disc Golf Fantasy League logo">
      <div>
        <h1>The Mediocre Disc Golf Fantasy League 2026</h1>
      </div>
    </header>

    <!-- JSON path controls hidden; page loads default data files automatically -->

    <div class="card table-wrap">
      <table id="standingsTable">
        <thead id="thead"></thead>
        <tbody id="tbody">
          <tr><td class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <footer class="muted footer" id="footer"></footer>
  </div>

  <script>
    // Highlight active nav link
    (function(){
      const links = document.querySelectorAll(".nav-link");
      links.forEach(link => {
        const here = location.pathname.split("/").pop() || "index.html";
        const target = (link.getAttribute("href") || "").split("/").pop();
        if (target === here) link.classList.add("active");
      });
    })();

    // ---------- tiny CSV parser ----------
    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cur = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (c === '"' && inQuotes && next === '"') { cur += '"'; i++; continue; }
        if (c === '"') { inQuotes = !inQuotes; continue; }

        if (!inQuotes && c === ",") { row.push(cur); cur = ""; continue; }
        if (!inQuotes && (c === "\n" || c === "\r")) {
          if (c === "\r" && next === "\n") i++;
          row.push(cur); cur = "";
          if (row.some(v => v.trim() !== "")) rows.push(row);
          row = [];
          continue;
        }
        cur += c;
      }
      row.push(cur);
      if (row.some(v => v.trim() !== "")) rows.push(row);
      return rows;
    }

    function norm(s){ return String(s ?? "").trim().toLowerCase(); }
    function sum(arr){ return arr.reduce((a,b)=>a+b,0); }

    function findColumnIndex(header, candidates){
      for (const cand of candidates) {
        const i = header.indexOf(cand);
        if (i >= 0) return i;
      }
      return -1;
    }

    async function loadEvents(){
      const path = "data/events.json";
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${path} (${res.status})`);
      const events = await res.json();
      if (!Array.isArray(events)) throw new Error("events.json must be an array");
      return events.filter(e => e && e.id && e.csv);
    }

    async function loadRosters(){
      const path = "data/rosters.json";
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${path} (${res.status})`);
      const roster = await res.json();
      if (!roster || !Array.isArray(roster.teams)) throw new Error("rosters.json must be an object with a teams[] array");
      return roster;
    }

    async function loadEventPointsMap(csvPath){
      const res = await fetch(csvPath, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${csvPath} (${res.status})`);
      const text = await res.text();
      const rows = parseCsv(text);
      if (rows.length < 2) return new Map();

      const header = rows[0].map(h => norm(h));
      const idxPdga = findColumnIndex(header, ["pdga", "pdga #", "pdga#", "pdganumber", "pdga number"]);
      const idxPts  = findColumnIndex(header, ["total points", "totalpoints", "points total", "total_points", "total_point"]);

      if (idxPdga < 0) throw new Error(`${csvPath}: missing PDGA column`);
      if (idxPts  < 0) throw new Error(`${csvPath}: missing Total Points column`);

      const map = new Map();
      for (const r of rows.slice(1)) {
        const pdga = String(r[idxPdga] ?? "").trim();
        if (!pdga) continue;
        const rawPts = String(r[idxPts] ?? "").trim();
        const pts = Number(rawPts);
        map.set(pdga, Number.isFinite(pts) ? pts : 0);
      }
      return map;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function shortEventLabel(evt){
      return (evt.id || evt.name || "").toUpperCase();
    }

    function buildTable({ events, roster, pointsByEvent }) {
      const thead = document.getElementById("thead");
      const tbody = document.getElementById("tbody");

      // Header row
      const trh = document.createElement("tr");
      const thRank = document.createElement("th"); thRank.textContent = "#";
      const thTeam = document.createElement("th"); thTeam.textContent = "Team / Player";
      trh.appendChild(thRank);
      trh.appendChild(thTeam);

      for (const evt of events) {
        const th = document.createElement("th");
        th.textContent = shortEventLabel(evt);
        trh.appendChild(th);
      }
      const thTotal = document.createElement("th");
      thTotal.textContent = "Season";
      trh.appendChild(thTotal);

      thead.innerHTML = "";
      thead.appendChild(trh);

      // Compute standings
      const teams = (roster?.teams || []).map((t, idx) => ({
        index: idx,
        name: (t?.name || `Team ${idx+1}`),
        players: (t?.players || []).filter(p => p && p.pdga)
      }));

      for (const team of teams) {
        // Pre-compute per-event and raw season totals for tie-break logic
        for (const p of team.players) {
          const perEvent = events.map(evt => {
            const m = pointsByEvent.get(evt.id);
            return m ? (m.get(String(p.pdga)) || 0) : 0;
          });
          p._perEvent = perEvent;
          p._rawSeason = sum(perEvent);
          // stable id for lookups (use PDGA when present)
          p._id = String(p.pdga || p.player || "");
        }

        // Apply 'top 5 scores count' rule per event.
        // Tie-break at the cutoff: if multiple players are tied for the last counted spot,
        // exclude the player with the WORST season total perspective (lowest p._rawSeason).
        team._countedByEvent = events.map((evt, i) => {
          const scored = team.players.map(p => ({
            id: p._id,
            score: Number(p._perEvent[i] || 0),
            rawSeason: Number(p._rawSeason || 0),
            name: String(p.player || "")
          }));

          // Sort best-to-worst for this event; if scores tie, prefer higher rawSeason
          scored.sort((a, b) => (b.score - a.score) || (b.rawSeason - a.rawSeason) || a.name.localeCompare(b.name));

          const keep = new Set();
          if (scored.length <= 5) {
            scored.forEach(s => keep.add(s.id));
            return keep;
          }

          const cutoffScore = scored[4].score;

          // Always keep anyone strictly above the cutoff
          const above = scored.filter(s => s.score > cutoffScore);
          above.forEach(s => keep.add(s.id));

          const remainingSlots = 5 - above.length;

          // Candidates exactly at cutoff score; choose the best ones by rawSeason
          const tied = scored.filter(s => s.score === cutoffScore)
                             .sort((a, b) => (b.rawSeason - a.rawSeason) || a.name.localeCompare(b.name));

          tied.slice(0, Math.max(0, remainingSlots)).forEach(s => keep.add(s.id));

          return keep;
        });

        team._perEvent = events.map((evt, i) => {
          const keep = team._countedByEvent[i];
          return team.players.reduce((acc, p) => acc + (keep.has(p._id) ? Number(p._perEvent[i] || 0) : 0), 0);
        });

        team._season = sum(team._perEvent);

        // Order players by COUNTED season contribution (sum of counted event points), then name
        for (const p of team.players) {
          p._countedSeason = team._countedByEvent.reduce((acc, keep, i) => acc + (keep.has(p._id) ? Number(p._perEvent[i] || 0) : 0), 0);
        }
        team.players.sort((a, b) => (b._countedSeason - a._countedSeason) || String(a.player).localeCompare(String(b.player)));
      }
teams.sort((a,b) => (b._season - a._season) || a.name.localeCompare(b.name));

      // Render
      tbody.innerHTML = "";

      if (!teams.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 2 + events.length + 1;
        td.className = "muted";
        td.style.padding = "16px";
        td.innerHTML = `No teams found in <code>rosters.json</code>.`;
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      teams.forEach((team, rankIdx) => {
        const trTeam = document.createElement("tr");
        trTeam.className = "team-row";

        const tdRank = document.createElement("td");
        tdRank.innerHTML = `<strong>${rankIdx+1}</strong>`;
        const tdName = document.createElement("td");
        tdName.innerHTML = `<strong>${escapeHtml(team.name)}</strong>`;

        trTeam.appendChild(tdRank);
        trTeam.appendChild(tdName);

        for (let i = 0; i < events.length; i++) {
          const td = document.createElement("td");
          td.textContent = team._perEvent[i] || 0;
          trTeam.appendChild(td);
        }
        const tdSeason = document.createElement("td");
        tdSeason.innerHTML = `<strong>${team._season || 0}</strong>`;
        trTeam.appendChild(tdSeason);

        tbody.appendChild(trTeam);

        team.players.forEach((p, pIndex) => {
          const trP = document.createElement("tr");

          const tdBlank = document.createElement("td");
          tdBlank.textContent = "";
          const tdPlayer = document.createElement("td");
          const displayName = p.player || "(Unnamed)";
          tdPlayer.innerHTML = `<span class="muted" style="padding-left:14px;">${escapeHtml(displayName)}</span>`;

          trP.appendChild(tdBlank);
          trP.appendChild(tdPlayer);

          for (let i = 0; i < events.length; i++) {
            const td = document.createElement("td");
            td.textContent = (p._perEvent?.[i] ?? 0);
            const counted = !!(team._countedByEvent?.[i] && team._countedByEvent[i].has(p._id));
            if (!counted && Number(p._perEvent?.[i] ?? 0) !== 0) td.classList.add('excluded-score');
            trP.appendChild(td);
          }
          const tdPSeason = document.createElement("td");
          tdPSeason.textContent = p._countedSeason || 0;
          trP.appendChild(tdPSeason);

          tbody.appendChild(trP);
        });
      });

      document.getElementById("footer").textContent = `Loaded ${teams.length} team(s) • ${events.length} event(s)`;
    }

    async function loadAndRender(){
      document.getElementById("tbody").innerHTML = `<tr><td class="muted">Loading…</td></tr>`;

      const roster = await loadRosters();
      const events = await loadEvents();
      if (!events.length) throw new Error("No events found in events.json");

      const pointsByEvent = new Map();
      for (const evt of events) {
        pointsByEvent.set(evt.id, await loadEventPointsMap(evt.csv));
      }

      buildTable({ events, roster, pointsByEvent });
    }

    loadAndRender().catch(err => {
      console.error(err);
      document.getElementById("tbody").innerHTML =
        `<tr><td class="muted" style="padding:16px;">Error: ${escapeHtml(err.message)}</td></tr>`;
    });
  </script>
</body>
</html>
