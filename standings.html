<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Standings</title>
  <style>
    :root{
      --bg:#0b0f17;
      --panel:#121a29;
      --panel2:#0f1624;
      --text:#e8eefc;
      --muted:#a9b6d3;
      --border:rgba(255,255,255,08);
      --accent:#6aa8ff;
      --danger:#ff6a6a;
      --ok:#7dffb1;
      --shadow: 0 12px 40px rgba(0,0,0,35);
      --radius:16px;
      --radius2:12px;
      --pad:16px;
      font-synthesis-weight:none;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 700px at 30% -10%, rgba(106,168,255,18), transparent 55%),
                  radial-gradient(1000px 700px at 90% 0%, rgba(125,255,177,10), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    a{color:inherit; text-decoration:none}

    .topbar{
      position:sticky; top:0; z-index:10;
      backdrop-filter: blur(10px);
      background: rgba(11,15,23,72);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner{
      max-width: 1100px;
      margin:0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .brand{display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.2px;}
    .dot{
      width:10px;height:10px;border-radius:99px;background:var(--accent);
      box-shadow: 0 0 0 5px rgba(106,168,255,14);
    }
    .nav{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end;}
    .nav a{
      padding:8px 10px;
      border:1px solid transparent;
      border-radius:999px;
      color:var(--muted);
    }
    .nav a:hover{
      border-color:var(--border);
      color:var(--text);
      background: rgba(255,255,255,03);
    }
    .nav a.active{
      border-color: rgba(106,168,255,35);
      color: var(--text);
      background: rgba(106,168,255,10);
    }

    .wrap{
      max-width:1100px;
      margin: 0 auto;
      padding: 22px 18px 40px;
    }

    .header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom: 14px;
    }
    h1{margin:0; font-size: 28px; letter-spacing:.2px;}
    .sub{margin:6px 0 0; color:var(--muted); font-size: 13px; line-height:1.35;}
    .status{display:flex; gap:10px; align-items:center;}
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,03);
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .card{
      border:1px solid var(--border);
      background: rgba(255,255,255,03);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card-h{
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      background: rgba(255,255,255,02);
    }
    .card-h .left{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }
    label{font-size:12px; color:var(--muted)}
    input{
      padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(15,22,36,55);
      color: var(--text);
      outline:none;
      min-width: 220px;
    }
    input:focus{border-color: rgba(106,168,255,40)}
    button{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,03);
      color: var(--text);
      cursor:pointer;
      font-weight:600;
    }
    button:hover{ background: rgba(255,255,255,06); }
    button.primary{
      border-color: rgba(106,168,255,40);
      background: rgba(106,168,255,12);
    }

    .table-wrap{ overflow:auto; }
    table{
      width:100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    thead th{
      position: sticky;
      top: 0;
      background: rgba(11,15,23,92);
      backdrop-filter: blur(6px);
      z-index: 2;
      border-bottom: 1px solid var(--border);
    }
    th, td{
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255,255,255,06);
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    th:first-child, td:first-child{ text-align:left; }
    th:nth-child(2), td:nth-child(2){ text-align:left; }

    .team-row td{
      font-weight:800;
      background: rgba(106,168,255,06);
      border-bottom: 1px solid rgba(106,168,255,18);
    }
    .team-rank{
      display:inline-grid;
      place-items:center;
      width:22px;height:22px;
      border-radius:9px;
      margin-right:8px;
      background: rgba(106,168,255,12);
      border: 1px solid rgba(106,168,255,22);
      font-size:12px;
      font-weight:800;
      color: var(--text);
      vertical-align: middle;
    }
    .player-name{
      color: var(--text);
      font-weight: 600;
    }
    .muted{ color: var(--muted); }
    .indent{
      padding-left: 26px;
      color: var(--muted);
      font-weight: 600;
    }
    .total-col{
      font-weight:800;
    }
    .empty{
      padding: 16px;
      color: var(--muted);
      line-height: 1.45;
    }
    code{
      background: rgba(255,255,255,06);
      border:1px solid rgba(255,255,255,08);
      padding:2px 6px;
      border-radius: 8px;
      color: var(--text);
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><span class="dot"></span><span>Disc Golf Fantasy</span></div>
      <div class="nav">
        <a class="active" href="standings.html">Standings</a>
        <a href="stats.html">Stats</a>
        <a href="rosters.html">Rosters</a>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="header">
      <div>
        <h1>Standings</h1>
        <p class="sub">Teams ranked by total points. Event columns follow <code>events.json</code> order.</p>
      </div>
      <div class="status">
        <span id="statusPill" class="pill">Ready</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:12px;">
      <div class="card-h">
        <div class="left">
          <div>
            <label for="eventsPath">Events JSON path</label><br/>
            <input id="eventsPath" type="text" value="data/events.json" />
          </div>
          <div>
            <label for="storageKey">Roster storage key</label><br/>
            <input id="storageKey" type="text" value="rosters:v1" />
          </div>
        </div>
        <div class="right">
          <button id="reloadBtn" class="primary">Reload</button>
        </div>
      </div>
    </div>

    <div class="card table-wrap">
      <table id="standingsTable">
        <thead id="thead"></thead>
        <tbody id="tbody">
          <tr><td class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // ---------- tiny CSV parser (same style as rosters) ----------
    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cur = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (c === '"' && inQuotes && next === '"') { cur += '"'; i++; continue; }
        if (c === '"') { inQuotes = !inQuotes; continue; }

        if (!inQuotes && c === ",") { row.push(cur); cur = ""; continue; }
        if (!inQuotes && (c === "\n" || c === "\r")) {
          if (c === "\r" && next === "\n") i++;
          row.push(cur); cur = "";
          if (row.some(v => v.trim() !== "")) rows.push(row);
          row = [];
          continue;
        }
        cur += c;
      }
      row.push(cur);
      if (row.some(v => v.trim() !== "")) rows.push(row);
      return rows;
    }

    function norm(s){ return String(s ?? "").trim().toLowerCase(); }

    function setStatus(text, ok=false){
      const pill = document.getElementById("statusPill");
      pill.textContent = text;
      pill.style.borderColor = ok ? "rgba(125,255,177,.35)" : "var(--border)";
      pill.style.background = ok ? "rgba(125,255,177,.10)" : "rgba(255,255,255,.03)";
      pill.style.color = ok ? "var(--text)" : "var(--muted)";
    }

    function getStorageKey(){
      return document.getElementById("storageKey").value.trim() || "rosters:v1";
    }

    function readRoster(){
      const key = getStorageKey();
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }

    async function loadEvents(){
      const path = document.getElementById("eventsPath").value.trim() || "events.json";
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${path} (${res.status})`);
      const events = await res.json();
      if (!Array.isArray(events)) throw new Error("events.json must be an array");
      // expected: [{id,name,csv}]
      return events.filter(e => e && e.id && e.csv);
    }

    function findColumnIndex(header, candidates){
      // header is normalized already
      for (const cand of candidates) {
        const i = header.indexOf(cand);
        if (i >= 0) return i;
      }
      return -1;
    }

    async function loadEventPointsMap(csvPath){
      // returns Map(pdga -> pointsNumber)
      const res = await fetch(csvPath, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${csvPath} (${res.status})`);
      const text = await res.text();
      const rows = parseCsv(text);
      if (rows.length < 2) return new Map();

      const header = rows[0].map(h => norm(h));
      const idxPdga = findColumnIndex(header, ["pdga", "pdga #", "pdga#", "pdganumber", "pdga number"]);
      const idxPts  = findColumnIndex(header, [
        "total points", "totalpoints", "points total", "total",
        "k", // just in case you ever label it by excel letter (unlikely)
        "total_point", "total_points"
      ]);

      if (idxPdga < 0) throw new Error(`${csvPath}: missing PDGA column`);
      if (idxPts  < 0) throw new Error(`${csvPath}: missing Total Points column`);

      const map = new Map();
      for (const r of rows.slice(1)) {
        const pdga = String(r[idxPdga] ?? "").trim();
        if (!pdga) continue;
        const rawPts = String(r[idxPts] ?? "").trim();
        const pts = Number(rawPts);
        map.set(pdga, Number.isFinite(pts) ? pts : 0);
      }
      return map;
    }

    function sum(arr){ return arr.reduce((a,b)=>a+b,0); }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function shortEventLabel(evt){
      // Keep columns tight, but still readable:
      // prefer id, fall back to name.
      return (evt.id || evt.name || "").toUpperCase();
    }

    function buildTable({ events, roster, pointsByEvent }) {
      const thead = document.getElementById("thead");
      const tbody = document.getElementById("tbody");

      // ---- header ----
      const trh = document.createElement("tr");
      const thRank = document.createElement("th"); thRank.textContent = "#";
      const thTeam = document.createElement("th"); thTeam.textContent = "Team / Player";
      trh.appendChild(thRank);
      trh.appendChild(thTeam);

      for (const evt of events) {
        const th = document.createElement("th");
        th.textContent = shortEventLabel(evt);
        trh.appendChild(th);
      }
      const thTotal = document.createElement("th");
      thTotal.textContent = "Season";
      trh.appendChild(thTotal);

      thead.innerHTML = "";
      const theadRow = document.createElement("thead");
      thead.appendChild(trh);

      // ---- compute standings ----
      const teams = (roster?.teams || []).map((t, idx) => ({
        index: idx,
        name: (t?.name || `Team ${idx+1}`),
        players: (t?.players || []).filter(p => p && p.pdga)
      }));

      // Build player totals per event + season
      for (const team of teams) {
        for (const p of team.players) {
          const perEvent = events.map(evt => {
            const m = pointsByEvent.get(evt.id);
            return m ? (m.get(String(p.pdga)) || 0) : 0;
          });
          p._perEvent = perEvent;
          p._season = sum(perEvent);
        }
        team._perEvent = events.map((_, i) => sum(team.players.map(p => p._perEvent[i] || 0)));
        team._season = sum(team._perEvent);
        // sort players within team
        team.players.sort((a,b) => (b._season - a._season) || String(a.player).localeCompare(String(b.player)));
      }

      // sort teams by season total
      teams.sort((a,b) => (b._season - a._season) || a.name.localeCompare(b.name));

      // ---- render rows ----
      tbody.innerHTML = "";

      if (!teams.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 2 + events.length + 1;
        td.className = "empty";
        td.innerHTML = `No teams found in this roster.<br/><br/>
          Go to <a href="rosters.html" style="text-decoration:underline;">Rosters</a> and build teams, then come back.`;
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      teams.forEach((team, rankIdx) => {
        // Team row
        const trTeam = document.createElement("tr");
        trTeam.className = "team-row";

        const tdRank = document.createElement("td");
        tdRank.innerHTML = `<span class="team-rank">${rankIdx+1}</span>`;
        const tdName = document.createElement("td");
        tdName.innerHTML = `${escapeHtml(team.name)}`;

        trTeam.appendChild(tdRank);
        trTeam.appendChild(tdName);

        for (let i = 0; i < events.length; i++) {
          const td = document.createElement("td");
          td.textContent = team._perEvent[i] || 0;
          trTeam.appendChild(td);
        }
        const tdSeason = document.createElement("td");
        tdSeason.className = "total-col";
        tdSeason.textContent = team._season || 0;
        trTeam.appendChild(tdSeason);

        tbody.appendChild(trTeam);

        // Player rows
        team.players.forEach((p, pIdx) => {
          const trP = document.createElement("tr");
          const tdBlank = document.createElement("td");
          tdBlank.innerHTML = `<span class="muted">•</span>`;
          const tdPlayer = document.createElement("td");
          const displayName = p.player || "(Unnamed)";
          tdPlayer.innerHTML = `<span class="indent">${escapeHtml(displayName)}</span> <span class="muted">(${escapeHtml(p.pdga)})</span>`;

          trP.appendChild(tdBlank);
          trP.appendChild(tdPlayer);

          for (let i = 0; i < events.length; i++) {
            const td = document.createElement("td");
            td.textContent = (p._perEvent?.[i] ?? 0);
            trP.appendChild(td);
          }
          const tdPSeason = document.createElement("td");
          tdPSeason.className = "total-col";
          tdPSeason.textContent = p._season || 0;
          trP.appendChild(tdPSeason);

          tbody.appendChild(trP);
        });
      });
    }

    async function loadAndRender(){
      setStatus("Loading…", false);

      const roster = readRoster();
      if (!roster || !Array.isArray(roster.teams)) {
        // Friendly empty state
        const tbody = document.getElementById("tbody");
        const thead = document.getElementById("thead");
        thead.innerHTML = "";
        tbody.innerHTML = "";
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 1;
        td.className = "empty";
        td.innerHTML = `No saved roster found for key <code>${escapeHtml(getStorageKey())}</code>.<br/><br/>
          Go to <a href="rosters.html" style="text-decoration:underline;">Rosters</a>, build teams, and make sure it saves locally.`;
        tr.appendChild(td);
        tbody.appendChild(tr);
        setStatus("No roster saved", false);
        return;
      }

      const events = await loadEvents();
      if (!events.length) throw new Error("No events found in events.json");

      // Load each event’s points map
      const pointsByEvent = new Map();
      for (const evt of events) {
        const map = await loadEventPointsMap(evt.csv);
        pointsByEvent.set(evt.id, map);
      }

      buildTable({ events, roster, pointsByEvent });
      setStatus(`Loaded • ${events.length} event(s)`, true);
    }

    document.getElementById("reloadBtn").addEventListener("click", () => {
      loadAndRender().catch(err => {
        console.error(err);
        setStatus(`Error: ${err.message}`, false);
      });
    });

    // initial load
    loadAndRender().catch(err => {
      console.error(err);
      setStatus(`Error: ${err.message}`, false);
    });
  </script>
</body>
</html>
