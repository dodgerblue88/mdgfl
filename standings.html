
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Mediocre Disc Golf Fantasy League — Standings</title>
  <link rel="stylesheet" href="assets/style.css" />

  <style>
    :root { --mdgfl-gold: #f5c542; }

    .standings-wrap {
      display: grid;
      gap: 18px;
    }

    tr.team-row td {
      color: #fff !important;
      font-weight: 700 !important;
    }

    tr.team-row .col-season {
      color: var(--mdgfl-gold) !important;
      font-weight: 800 !important;
    }

    tr.player-row td {
      color: var(--txt) !important;
      font-weight: 400 !important;
    }

    tr.player-row .col-team .muted {
      color: var(--txt) !important;
      font-weight: 400 !important;
    }

    tr.player-row .col-season {
      color: var(--mdgfl-gold) !important;
      font-weight: 400 !important;
    }

    td.excluded-score {
      text-decoration: line-through;
      opacity: 0.55;
    }

    .col-rank,
    .col-event,
    .col-season {
      text-align: center;
    }

    th.col-rank,
    th.col-event,
    th.col-season {
      text-align: center;
      font-weight: 800;
    }

    th.col-team {
      text-align: left;
      color: #fff !important;
      font-weight: 800 !important;
    }

    th.col-event {
      color: #fff !important;
      font-weight: 800 !important;
    }

    th.col-season {
      color: var(--mdgfl-gold) !important;
      font-weight: 800 !important;
    }

    td.col-team {
      text-align: left;
    }

    .rank-pill {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid rgba(245, 197, 66, .25);
      background: rgba(245, 197, 66, .10);
      color: var(--mdgfl-gold);
      font-weight: 800;
      font-size: 12px;
    }

    .movement {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      margin-left: 8px;
      font-size: 14px;
      font-weight: 900;
      vertical-align: middle;
    }

    .movement.up {
      color: #6fbf4b;
    }

    .movement.down {
      color: var(--mdgfl-gold);
    }

    .movement.flat {
      color: rgba(255,255,255,.35);
      font-size: 11px;
      min-width: 12px;
    }

    .movement.poo {
      font-size: 18px;
      line-height: 1;
    }
  </style>
</head>

<body>
  <nav class="subnav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="standings.html" class="nav-link">Standings</a>
    <a href="stats.html" class="nav-link">Stats</a>
    <a href="trophy.html" class="nav-link">Trophy Room</a>
  </nav>

  <div class="wrap standings-wrap">
    <header class="header card">
      <img class="logo-img" src="assets/logo.png" alt="The Mediocre Disc Golf Fantasy League logo">
      <div>
        <h1>The Mediocre Disc Golf Fantasy League 2026</h1>
      </div>
    </header>

    <div class="card table-wrap">
      <table id="standingsTable">
        <thead id="thead"></thead>
        <tbody id="tbody">
          <tr><td class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <footer class="muted footer" id="footer"></footer>
  </div>

  <script>
    (function(){
      const links = document.querySelectorAll(".nav-link");
      links.forEach(link => {
        const here = location.pathname.split("/").pop() || "index.html";
        const href = (link.getAttribute("href") || "").split("/").pop();
        if (href === here) link.classList.add("active");
      });
    })();

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (c === '"' && inQuotes && next === '"') {
          cur += '"';
          i++;
          continue;
        }
        if (c === '"') {
          inQuotes = !inQuotes;
          continue;
        }
        if (!inQuotes && c === ",") {
          row.push(cur);
          cur = "";
          continue;
        }
        if (!inQuotes && (c === "\n" || c === "\r")) {
          if (c === "\r" && next === "\n") i++;
          row.push(cur);
          cur = "";
          if (row.some(v => String(v).trim() !== "")) rows.push(row);
          row = [];
          continue;
        }
        cur += c;
      }

      row.push(cur);
      if (row.some(v => String(v).trim() !== "")) rows.push(row);
      return rows;
    }

    function norm(s){
      return String(s ?? "").trim().toLowerCase().replace(/[_\s#]+/g, " ");
    }

    function sum(arr){
      return arr.reduce((a, b) => a + Number(b || 0), 0);
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function findColumnIndex(header, candidates){
      const normalized = header.map(h => norm(h));

      for (const cand of candidates) {
        const want = norm(cand);
        const exact = normalized.indexOf(want);
        if (exact >= 0) return exact;
      }

      for (const cand of candidates) {
        const want = norm(cand);
        const loose = normalized.findIndex(h => h.includes(want) || want.includes(h));
        if (loose >= 0) return loose;
      }

      return -1;
    }

    function shortEventLabel(evt){
      return (evt.id || evt.name || "").toUpperCase();
    }

    async function loadEvents(){
      const path = "data/events.json";
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${path} (${res.status})`);
      const events = await res.json();
      if (!Array.isArray(events)) throw new Error("events.json must be an array");
      return events.filter(e => e && e.id && e.csv);
    }

    async function loadRosters(){
      const path = "data/rosters.json";
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${path} (${res.status})`);
      const roster = await res.json();
      if (!roster || !Array.isArray(roster.teams)) throw new Error("rosters.json must be an object with a teams[] array");
      return roster;
    }

    async function loadEventPointsMap(csvPath){
      const res = await fetch(csvPath, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${csvPath} (${res.status})`);
      const text = await res.text();
      const rows = parseCsv(text);
      if (rows.length < 2) return new Map();

      const header = rows[0];
      const idxPdga = findColumnIndex(header, ["PDGA", "PDGA #", "PDGA Number", "PDGANumber"]);
      const idxPts = findColumnIndex(header, ["Total Points", "Points", "Fantasy Points", "Event Points"]);

      if (idxPdga < 0) throw new Error(`${csvPath}: missing PDGA column`);
      if (idxPts < 0) throw new Error(`${csvPath}: missing points column`);

      const map = new Map();
      for (const r of rows.slice(1)) {
        const pdga = String(r[idxPdga] ?? "").trim();
        if (!pdga) continue;
        const rawPts = String(r[idxPts] ?? "").trim().replace(/,/g, "");
        const pts = Number(rawPts);
        map.set(pdga, Number.isFinite(pts) ? pts : 0);
      }
      return map;
    }

    function movementInfo(currentRank, previousRank) {
      if (!Number.isFinite(previousRank) && Number.isFinite(currentRank)) return { cls: "up", symbol: "▲", label: "New to rankings" };
      if (!Number.isFinite(currentRank)) return { cls: "flat", symbol: "•", label: "No change" };
      if (currentRank < previousRank) return { cls: "up", symbol: "▲", label: `Up ${previousRank - currentRank}` };
      if (currentRank > previousRank) return { cls: "down", symbol: "▼", label: `Down ${currentRank - previousRank}` };
      return { cls: "flat", symbol: "•", label: "No change" };
    }

    function movementHtml(info) {
      return `<span class="movement ${info.cls}" title="${escapeHtml(info.label)}">${info.symbol}</span>`;
    }

    function buildRankMap(items, getKey) {
      const map = new Map();
      items.forEach((item, idx) => map.set(getKey(item), idx + 1));
      return map;
    }

    function computeTeams(events, roster, pointsByEvent) {
      const teams = (roster?.teams || []).map((t, idx) => ({
        index: idx,
        name: (t?.name || `Team ${idx + 1}`),
        players: (t?.players || []).filter(p => p && p.pdga).map(p => ({ ...p }))
      }));

      for (const team of teams) {
        for (const p of team.players) {
          p._id = String(p.pdga || p.player || "");
          p._perEvent = events.map(evt => {
            const eventMap = pointsByEvent.get(evt.id);
            if (!eventMap) return 0;
            const raw = eventMap.get(String(p.pdga));
            return Number.isFinite(Number(raw)) ? Number(raw) : 0;
          });
          p._rawSeason = sum(p._perEvent);
        }

        team._countedByEvent = events.map((evt, i) => {
          const scored = team.players.map(p => ({
            id: p._id,
            score: Number(p._perEvent[i] ?? 0),
            rawSeason: Number(p._rawSeason ?? 0),
            name: String(p.player || "")
          }));

          scored.sort((a, b) => (b.score - a.score) || (b.rawSeason - a.rawSeason) || a.name.localeCompare(b.name));

          const keep = new Set();
          if (scored.length <= 5) {
            scored.forEach(s => keep.add(s.id));
            return keep;
          }

          const cutoffScore = scored[4].score;
          const above = scored.filter(s => s.score > cutoffScore);
          above.forEach(s => keep.add(s.id));

          const remainingSlots = 5 - above.length;
          const tied = scored
            .filter(s => s.score === cutoffScore)
            .sort((a, b) => (b.rawSeason - a.rawSeason) || a.name.localeCompare(b.name));

          tied.slice(0, Math.max(0, remainingSlots)).forEach(s => keep.add(s.id));
          return keep;
        });

        team._perEvent = events.map((evt, i) => {
          const keep = team._countedByEvent[i];
          return team.players.reduce((acc, p) => acc + (keep.has(p._id) ? Number(p._perEvent[i] ?? 0) : 0), 0);
        });

        team._season = sum(team._perEvent);

        for (const p of team.players) {
          p._countedSeason = team._countedByEvent.reduce((acc, keep, i) => {
            return acc + (keep.has(p._id) ? Number(p._perEvent[i] ?? 0) : 0);
          }, 0);
        }

        team.players.sort((a, b) => (b._countedSeason - a._countedSeason) || String(a.player || "").localeCompare(String(b.player || "")));
      }

      teams.sort((a, b) => (b._season - a._season) || a.name.localeCompare(b.name));
      return teams;
    }

    function buildTable({ events, teams, previousRankMap }) {
      const thead = document.getElementById("thead");
      const tbody = document.getElementById("tbody");

      const trh = document.createElement("tr");

      const thRank = document.createElement("th");
      thRank.textContent = "#";
      thRank.className = "col-rank";
      trh.appendChild(thRank);

      const thTeam = document.createElement("th");
      thTeam.textContent = "Team / Player";
      thTeam.className = "col-team";
      trh.appendChild(thTeam);

      const thSeason = document.createElement("th");
      thSeason.textContent = "Season Pts";
      thSeason.className = "col-season";
      trh.appendChild(thSeason);

      for (const evt of events) {
        const th = document.createElement("th");
        th.textContent = shortEventLabel(evt);
        th.className = "col-event";
        trh.appendChild(th);
      }

      thead.innerHTML = "";
      thead.appendChild(trh);

      tbody.innerHTML = "";

      if (!teams.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 3 + events.length;
        td.className = "muted";
        td.style.padding = "16px";
        td.innerHTML = "No teams found in <code>rosters.json</code>.";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      teams.forEach((team, rankIdx) => {
        const trTeam = document.createElement("tr");
        trTeam.className = "team-row";

        const tdRank = document.createElement("td");
        tdRank.className = "col-rank";
        tdRank.innerHTML = `<span class="rank-pill">${rankIdx + 1}</span>`;
        trTeam.appendChild(tdRank);

        const tdName = document.createElement("td");
        tdName.className = "col-team";
        const move = movementInfo(rankIdx + 1, previousRankMap.get(team.name));
        const isLast = rankIdx === teams.length - 1;
        const indicator = isLast
          ? '<span class="movement poo" title="Meme of Shame">💩</span>'
          : movementHtml(move);
        tdName.innerHTML = `<strong>${escapeHtml(team.name)}</strong>${indicator}`;
        trTeam.appendChild(tdName);

        const tdSeason = document.createElement("td");
        tdSeason.className = "col-season";
        tdSeason.innerHTML = `<strong>${team._season ?? 0}</strong>`;
        trTeam.appendChild(tdSeason);

        for (let i = 0; i < events.length; i++) {
          const td = document.createElement("td");
          td.className = "col-event";
          td.textContent = String(team._perEvent[i] ?? 0);
          trTeam.appendChild(td);
        }

        tbody.appendChild(trTeam);

        team.players.forEach((p) => {
          const trP = document.createElement("tr");
          trP.className = "player-row";

          const tdBlank = document.createElement("td");
          tdBlank.className = "col-rank";
          tdBlank.textContent = "";
          trP.appendChild(tdBlank);

          const tdPlayer = document.createElement("td");
          tdPlayer.className = "col-team";
          tdPlayer.innerHTML = `<span class="muted">${escapeHtml(p.player || "(Unnamed)")}</span>`;
          trP.appendChild(tdPlayer);

          const tdPSeason = document.createElement("td");
          tdPSeason.className = "col-season";
          tdPSeason.textContent = String(p._countedSeason ?? 0);
          trP.appendChild(tdPSeason);

          for (let i = 0; i < events.length; i++) {
            const points = Number.isFinite(Number(p._perEvent[i])) ? Number(p._perEvent[i]) : 0;
            const counted = !!(team._countedByEvent[i] && team._countedByEvent[i].has(p._id));

            const td = document.createElement("td");
            td.className = "col-event";
            td.textContent = String(points);

            if (!counted && points !== 0) {
              td.classList.add("excluded-score");
            }

            trP.appendChild(td);
          }

          tbody.appendChild(trP);
        });
      });
    }

    async function loadAndRender(){
      document.getElementById("tbody").innerHTML = '<tr><td class="muted">Loading…</td></tr>';

      const [roster, events] = await Promise.all([loadRosters(), loadEvents()]);
      if (!events.length) throw new Error("No events found in events.json");

      const pointsByEvent = new Map();
      for (const evt of events) {
        pointsByEvent.set(evt.id, await loadEventPointsMap(evt.csv));
      }

      const teams = computeTeams(events, roster, pointsByEvent);
      const previousEvents = events.slice(0, -1);
      const previousTeams = computeTeams(previousEvents, roster, pointsByEvent);
      const previousRankMap = buildRankMap(previousTeams, t => t.name);

      buildTable({ events, teams, previousRankMap });

      document.getElementById("footer").textContent = `Loaded ${teams.length} team(s) • ${events.length} event(s)`;
    }

    loadAndRender().catch(err => {
      console.error(err);
      document.getElementById("tbody").innerHTML = `<tr><td class="muted" style="padding:16px;">Error: ${escapeHtml(err.message)}</td></tr>`;
      document.getElementById("footer").textContent = "Check your data and file paths.";
    });
  </script>
</body>
</html>
