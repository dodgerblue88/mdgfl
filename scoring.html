
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MDGFL — Scoring</title>
<link rel="stylesheet" href="assets/style.css"/>

<style>
.toolbar{display:flex;gap:10px;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap}
.btn{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:700}
.btn.primary{background:rgba(245,197,66,.15);border-color:rgba(245,197,66,.5)}
.card{padding:18px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
.slot{display:grid;grid-template-columns:150px 1fr;gap:10px;margin-bottom:10px}
input{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:#0c1220;color:#fff}
.section-title{font-weight:800;margin-bottom:10px}
.save-pill{padding:6px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.15)}
</style>
</head>

<body>

<nav class="subnav">
<a href="index.html">Home</a>
<a href="standings.html">Standings</a>
<a href="stats.html">Stats</a>
<a href="rosters.html">Rosters</a>
<a href="scoring.html">Scoring</a>
</nav>

<div class="wrap">

<header class="header">
<img src="assets/logo.png" class="logo-img"/>
<h1>Scoring Settings</h1>
</header>

<div class="toolbar">
<div id="savePill" class="save-pill">Not saved</div>
<div>
<button class="btn" onclick="loadLocal()">Load Local</button>
<button class="btn" onclick="loadCSV()">Load CSV</button>
<button class="btn primary" onclick="saveCSV()">Save CSV</button>
<button class="btn primary" onclick="saveLocal()">Save Local</button>
</div>
</div>

<div class="grid">

<div class="card">
<div class="section-title">Finishing</div>
<div class="slot"><div>Wins</div><input id="Wins"/></div>
<div class="slot"><div>Top 3s</div><input id="Top 3s"/></div>
<div class="slot"><div>Top 10s</div><input id="Top 10s"/></div>
<div class="slot"><div>Top 20s</div><input id="Top 20s"/></div>
</div>

<div class="card">
<div class="section-title">Stats</div>
<div class="slot"><div>Albatrosses</div><input id="Albatrosses"/></div>
<div class="slot"><div>Aces</div><input id="Aces"/></div>
<div class="slot"><div>Eagles</div><input id="Eagles"/></div>
<div class="slot"><div>Birdies</div><input id="Birdies"/></div>
<div class="slot"><div>Pars</div><input id="Pars"/></div>
<div class="slot"><div>Bogeys+</div><input id="Bogeys+"/></div>
</div>

<div class="card">
<div class="section-title">Multipliers</div>
<div class="slot"><div>Major Multiplier</div><input id="Major Multiplier"/></div>
</div>

</div>

</div>

<script>

const fields = ["Wins","Top 3s","Top 10s","Top 20s","Albatrosses","Aces","Eagles","Birdies","Pars","Bogeys+","Major Multiplier"];
const STORAGE_KEY = "scoring:v1";

function getData(){
let data={}
fields.forEach(f=>data[f]=document.getElementById(f).value)
return data
}

function setData(data){
fields.forEach(f=>{
if(document.getElementById(f)) document.getElementById(f).value=data[f]||""
})
}

function saveLocal(){
localStorage.setItem(STORAGE_KEY, JSON.stringify(getData()))
updatePill("Saved locally")
}

function loadLocal(){
const data = JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")
setData(data)
updatePill("Loaded local")
}

function saveCSV(){
let csv = "Setting,Value\n";
fields.forEach(f=>{
csv += `${f},${document.getElementById(f).value}\n`;
});
const blob = new Blob([csv], {type: "text/csv"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "scoring.csv";
a.click();
updatePill("CSV downloaded")
}

function loadCSV(){
fetch("data/scoring.csv")
.then(r=>r.text())
.then(text=>{
const lines = text.split("\n").slice(1);
let data={}
lines.forEach(l=>{
const [k,v] = l.split(",");
data[k]=v
})
setData(data)
updatePill("CSV loaded")
});
}

function updatePill(text){
document.getElementById("savePill").innerText=text
}

</script>

</body>
</html>
