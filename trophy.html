
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Mediocre Disc Golf Fantasy League — Trophy Room</title>
  <link rel="stylesheet" href="assets/style.css" />

  <style>
    :root {
      --mdgfl-gold: #f5c542;
      --mdgfl-gold-soft: rgba(245, 197, 66, .14);
      --mdgfl-wood-1: #8c6239;
      --mdgfl-wood-2: #6f4a29;
      --mdgfl-wood-3: #4f331a;
      --mdgfl-card-glow: rgba(245, 197, 66, .08);
    }

    .trophy-wrap {
      display: grid;
      gap: 18px;
    }

    .trophy-room-card {
      padding: 18px 18px 20px;
    }

    .trophy-room-title {
      margin: 0 0 6px;
      color: var(--mdgfl-gold);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .01em;
      text-align: left;
    }

    .trophy-room-subtitle {
      margin: 0;
      text-align: left;
    }

    .shelves {
      display: grid;
      gap: 16px;
    }

    .team-card {
      padding: 16px 16px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.02);
    }

    .team-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .team-name {
      color: var(--mdgfl-gold);
      font-size: 20px;
      font-weight: 800;
      margin: 0;
    }

    .team-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .shelf-zone {
      position: relative;
      min-height: 146px;
      padding: 14px 0 22px;
    }

    .shelf-scroll {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      padding: 0 0 8px;
    }

    .shelf-scroll::-webkit-scrollbar {
      height: 10px;
    }

    .shelf-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.14);
      border-radius: 999px;
    }

    .shelf-inner {
      width: max-content;
      min-width: 100%;
      margin: 0 auto;
      padding: 0 8px;
    }

    .trophy-row {
      min-height: 112px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 18px;
      flex-wrap: nowrap;
      position: relative;
      z-index: 2;
      width: max-content;
      min-width: 100%;
      margin: 0 auto;
    }

    .shelf-board {
      position: relative;
      z-index: 1;
      width: max(840px, 100%);
      min-width: 100%;
      height: 16px;
      margin: -2px auto 0;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0) 28%),
        linear-gradient(90deg, var(--mdgfl-wood-1), var(--mdgfl-wood-2) 35%, var(--mdgfl-wood-3) 70%, var(--mdgfl-wood-2));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 -2px 0 rgba(0,0,0,.28),
        0 8px 20px rgba(0,0,0,.22);
    }

    .shelf-board::before,
    .shelf-board::after {
      content: "";
      position: absolute;
      top: 2px;
      width: 16px;
      height: 28px;
      border-radius: 4px;
      background: linear-gradient(180deg, #6c4525, #4a2e18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .shelf-board::before { left: 28px; }
    .shelf-board::after { right: 28px; }

    .no-trophies {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 92px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    .trophy {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: calc(var(--cup-width) + 42px);
      min-width: calc(var(--cup-width) + 42px);
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.28));
    }

    .trophy-topper {
      width: var(--topper-width);
      height: var(--topper-height);
      margin-bottom: 2px;
      border-radius: var(--topper-radius);
      background: linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.08)), var(--trophy-color);
      border: 1px solid rgba(255,255,255,.18);
      display: var(--topper-display);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.32);
    }

    .trophy-cup-wrap {
      position: relative;
      width: calc(var(--cup-width) + 34px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .trophy-handle {
      position: absolute;
      top: var(--handle-top);
      width: var(--handle-width);
      height: var(--handle-height);
      border: var(--handle-thickness) solid color-mix(in srgb, var(--trophy-color) 78%, white 22%);
      border-radius: 999px;
      opacity: var(--handle-opacity);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22);
      pointer-events: none;
    }

    .trophy-handle.left { left: var(--handle-left); }
    .trophy-handle.right { right: var(--handle-right); }

    .trophy-cup {
      position: relative;
      width: var(--cup-width);
      height: var(--cup-height);
      border-radius: var(--cup-radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,.10) 24%, rgba(255,255,255,.03) 26%),
        linear-gradient(180deg, color-mix(in srgb, var(--trophy-color) 88%, white 12%), color-mix(in srgb, var(--trophy-color) 62%, black 38%));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.30),
        inset 0 -5px 10px rgba(0,0,0,.12),
        0 0 0 1px rgba(0,0,0,.08);
      overflow: hidden;
      clip-path: var(--cup-clip);
    }

    .trophy-cup::after {
      content: "";
      position: absolute;
      left: 14%;
      top: 12%;
      width: 18%;
      height: 54%;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      transform: rotate(10deg);
      filter: blur(.4px);
    }

    .trophy-stem {
      width: var(--stem-width);
      height: var(--stem-height);
      margin-top: 2px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.52), rgba(255,255,255,.06)), color-mix(in srgb, var(--trophy-color) 72%, #4b3522 28%);
      border: 1px solid rgba(255,255,255,.15);
    }

    .trophy-neck {
      width: var(--neck-width);
      height: var(--neck-height);
      margin-top: 2px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,.04)), color-mix(in srgb, var(--trophy-color) 62%, #3d2d1c 38%);
      border: 1px solid rgba(255,255,255,.13);
      display: var(--neck-display);
    }

    .trophy-base-top {
      width: var(--base-top-width);
      height: var(--base-top-height);
      margin-top: 3px;
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.02)), #493220;
      border: 1px solid rgba(255,255,255,.10);
      display: var(--base-top-display);
    }

    .trophy-base {
      width: var(--base-width);
      height: var(--base-height);
      margin-top: 2px;
      border-radius: var(--base-radius);
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.02)), #2f2217;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .trophy-plaque {
      margin-top: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(245, 197, 66, .20);
      background: var(--mdgfl-gold-soft);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
    }


    .trophy[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%) translateY(6px);
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(12, 14, 20, .96);
      border: 1px solid rgba(245, 197, 66, .24);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
      box-shadow: 0 10px 22px rgba(0,0,0,.28);
      z-index: 10;
    }

    .trophy[data-tooltip]:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 720px) {
      .team-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .team-name,
      .team-meta,
      .trophy-room-title,
      .trophy-room-subtitle {
        text-align: center;
        width: 100%;
      }

      .shelf-zone {
        padding-left: 0;
        padding-right: 0;
      }

      .shelf-scroll {
        padding-bottom: 10px;
      }

      .shelf-inner {
        padding: 0 6px;
      }

      .trophy-row {
        gap: 14px;
      }

      .trophy {
        transform: none;
      }
    }
  </style>
</head>

<body>
  <nav class="subnav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="standings.html" class="nav-link">Standings</a>
    <a href="stats.html" class="nav-link">Stats</a>
    <a href="trophy.html" class="nav-link">Trophy Room</a>
  </nav>

  <div class="wrap trophy-wrap">
    <header class="header card">
      <img class="logo-img" src="assets/logo.png" alt="The Mediocre Disc Golf Fantasy League logo">
      <div>
        <h1>The Mediocre Disc Golf Fantasy League 2026</h1>
      </div>
    </header>

    <section class="shelves" id="shelves">
      <div class="card team-card"><div class="muted">Loading trophy room…</div></div>
    </section>

    <footer class="muted footer" id="footer"></footer>
  </div>

  <script>
    (function(){
      const links = document.querySelectorAll('.nav-link');
      links.forEach(link => {
        const here = location.pathname.split('/').pop() || 'index.html';
        const target = (link.getAttribute('href') || '').split('/').pop();
        if (target === here) link.classList.add('active');
      });
    })();

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];
        if (c === '"' && inQuotes && next === '"') { cur += '"'; i++; continue; }
        if (c === '"') { inQuotes = !inQuotes; continue; }
        if (!inQuotes && c === ',') { row.push(cur); cur = ''; continue; }
        if (!inQuotes && (c === '\n' || c === '\r')) {
          if (c === '\r' && next === '\n') i++;
          row.push(cur); cur = '';
          if (row.some(v => String(v).trim() !== '')) rows.push(row);
          row = [];
          continue;
        }
        cur += c;
      }
      row.push(cur);
      if (row.some(v => String(v).trim() !== '')) rows.push(row);
      return rows;
    }

    function norm(s){ return String(s ?? '').trim().toLowerCase().replace(/[_\s#]+/g, ' '); }
    function sum(arr){ return arr.reduce((a,b)=>a + Number(b || 0), 0); }

    function findColumnIndex(header, candidates){
      const normalized = header.map(h => norm(h));
      for (const cand of candidates) {
        const want = norm(cand);
        const exact = normalized.indexOf(want);
        if (exact >= 0) return exact;
      }
      for (const cand of candidates) {
        const want = norm(cand);
        const loose = normalized.findIndex(h => h.includes(want) || want.includes(h));
        if (loose >= 0) return loose;
      }
      return -1;
    }

    function escapeHtml(s){
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function loadEvents(){
      const path = 'data/events.json';
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to load ${path} (${res.status})`);
      const events = await res.json();
      if (!Array.isArray(events)) throw new Error('events.json must be an array');
      return events.filter(e => e && e.id && e.csv);
    }

    async function loadRosters(){
      const path = 'data/rosters.json';
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to load ${path} (${res.status})`);
      const roster = await res.json();
      if (!roster || !Array.isArray(roster.teams)) throw new Error('rosters.json must be an object with a teams[] array');
      return roster;
    }

    async function loadEventPointsMap(csvPath){
      const res = await fetch(csvPath, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to load ${csvPath} (${res.status})`);
      const text = await res.text();
      const rows = parseCsv(text);
      if (rows.length < 2) return new Map();

      const header = rows[0];
      const idxPdga = findColumnIndex(header, ['PDGA', 'PDGA #', 'PDGA Number', 'PDGANumber']);
      const idxPts  = findColumnIndex(header, ['Total Points', 'Points', 'Fantasy Points', 'Event Points']);
      if (idxPdga < 0) throw new Error(`${csvPath}: missing PDGA column`);
      if (idxPts < 0) throw new Error(`${csvPath}: missing points column`);

      const map = new Map();
      for (const r of rows.slice(1)) {
        const pdga = String(r[idxPdga] ?? '').trim();
        if (!pdga) continue;
        const rawPts = String(r[idxPts] ?? '').trim().replace(/,/g, '');
        const pts = Number(rawPts);
        map.set(pdga, Number.isFinite(pts) ? pts : 0);
      }
      return map;
    }

    function seededNumber(seed){
      let h = 2166136261;
      const str = String(seed);
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return (h >>> 0) / 4294967295;
    }

    function pick(seed, values){
      return values[Math.floor(seededNumber(seed) * values.length)] || values[0];
    }

    function buildVariantKey(teamName, eventId){
      return `${teamName}__${eventId}`;
    }

    function trophyVars(item, minScore, maxScore){
      const key = buildVariantKey(item.team, item.eventId);

      const rawScore = Math.max(1, Number(item.score) || 1);
      const scaledScore = 34 * Math.pow(rawScore, 0.585);
      const scorePx = Math.max(56, Math.round(scaledScore));
      const bodyHeight = scorePx;
      const widthFactor = 0.52 + seededNumber(key + 'wf') * 0.42;
      const bodyWidth = Math.max(34, Math.round(scorePx * widthFactor));
      const stemWidth = Math.max(10, Math.round(bodyWidth * (0.18 + seededNumber(key + 'sw') * 0.20)));
      const stemHeight = Math.max(10, Math.round(scorePx * (0.12 + seededNumber(key + 'sh') * 0.10)));
      const neckWidth = Math.max(stemWidth + 4, Math.round(bodyWidth * (0.24 + seededNumber(key + 'nw') * 0.18)));
      const neckHeight = Math.max(5, Math.round(scorePx * (0.05 + seededNumber(key + 'nh') * 0.05)));
      const baseWidth = Math.max(bodyWidth * 0.62, Math.round(bodyWidth * (0.72 + seededNumber(key + 'bw') * 0.34)));
      const baseHeight = Math.max(12, Math.round(scorePx * (0.10 + seededNumber(key + 'bh') * 0.06)));
      const baseTopWidth = Math.max(stemWidth + 8, Math.round(baseWidth * (0.68 + seededNumber(key + 'btw') * 0.16)));
      const baseTopHeight = Math.max(5, Math.round(baseHeight * (0.42 + seededNumber(key + 'bth') * 0.30)));
      const topperType = pick(key + 'tt', ['none', 'orb', 'crown', 'flat']);
      const handleMode = pick(key + 'hm', ['both', 'left', 'right', 'none']);
      const bodyShape = pick(key + 'bs', ['round', 'taper', 'shield', 'arch', 'square']);
      const baseShape = pick(key + 'ba', ['6px', '8px', '12px', '999px']);
      const colors = ['#f5c542', '#d7dadf', '#cd7f32', '#87c8ff', '#d59cff', '#7ed9a4', '#ff8e6e'];
      const color = pick(key + 'co', colors);

      const clipMap = {
        round: 'none',
        taper: 'polygon(6% 0%, 94% 0%, 82% 100%, 18% 100%)',
        shield: 'polygon(10% 0%, 90% 0%, 100% 28%, 86% 100%, 14% 100%, 0% 28%)',
        arch: 'polygon(12% 8%, 20% 0%, 80% 0%, 88% 8%, 94% 100%, 6% 100%)',
        square: 'inset(0 round 8px)'
      };

      const radiusMap = {
        round: '16px 16px 12px 12px',
        taper: '14px 14px 10px 10px',
        shield: '18px 18px 12px 12px',
        arch: '18px 18px 8px 8px',
        square: '10px'
      };

      const topperConfig = {
        none: { display: 'none', width: 0, height: 0, radius: '0' },
        orb: { display: 'block', width: Math.round(bodyWidth * .34), height: Math.round(bodyWidth * .34), radius: '999px' },
        crown: { display: 'block', width: Math.round(bodyWidth * .62), height: Math.max(10, Math.round(scorePx * .07)), radius: '10px 10px 4px 4px' },
        flat: { display: 'block', width: Math.round(bodyWidth * .46), height: Math.max(6, Math.round(scorePx * .04)), radius: '999px' }
      }[topperType];

      const handleWidth = Math.max(12, Math.round(bodyWidth * (0.20 + seededNumber(key + 'hw') * 0.16)));
      const handleHeight = Math.max(18, Math.round(bodyHeight * (.34 + seededNumber(key + 'hh') * .24)));
      const handleTop = 6 + Math.round(bodyHeight * (0.06 + seededNumber(key + 'ht') * 0.14));
      const handleThickness = Math.max(3, Math.round(bodyWidth * (0.06 + seededNumber(key + 'hk') * 0.03)));
      const handleLeft = 1 + Math.round(seededNumber(key + 'hl') * 6);
      const handleRight = 1 + Math.round(seededNumber(key + 'hr') * 6);

      return {
        '--trophy-color': color,
        '--cup-width': `${bodyWidth}px`,
        '--cup-height': `${bodyHeight}px`,
        '--cup-radius': radiusMap[bodyShape],
        '--cup-clip': clipMap[bodyShape],
        '--stem-width': `${stemWidth}px`,
        '--stem-height': `${stemHeight}px`,
        '--neck-width': `${neckWidth}px`,
        '--neck-height': `${neckHeight}px`,
        '--neck-display': seededNumber(key + 'nd') > 0.28 ? 'block' : 'none',
        '--base-width': `${Math.round(Math.max(baseWidth, stemWidth + 10))}px`,
        '--base-height': `${baseHeight}px`,
        '--base-radius': baseShape,
        '--base-top-width': `${Math.round(Math.max(baseTopWidth, stemWidth + 8))}px`,
        '--base-top-height': `${baseTopHeight}px`,
        '--base-top-display': seededNumber(key + 'btd') > 0.22 ? 'block' : 'none',
        '--topper-width': `${topperConfig.width}px`,
        '--topper-height': `${topperConfig.height}px`,
        '--topper-radius': topperConfig.radius,
        '--topper-display': topperConfig.display,
        '--handle-width': `${handleWidth}px`,
        '--handle-height': `${handleHeight}px`,
        '--handle-top': `${handleTop}px`,
        '--handle-left': `${handleLeft}px`,
        '--handle-right': `${handleRight}px`,
        '--handle-thickness': `${handleThickness}px`,
        '--handle-opacity': handleMode === 'none' ? 0 : 1
      };
    }

    function styleObjectToCssText(obj){
      return Object.entries(obj).map(([k,v]) => `${k}:${v}`).join(';');
    }

    async function computeTrophyData(){
      const [events, roster] = await Promise.all([loadEvents(), loadRosters()]);
      const teams = (roster.teams || []).map(t => ({
        name: t.name,
        players: (t.players || []).map(p => String(p?.pdga ?? '').trim()).filter(Boolean),
        trophies: []
      }));

      for (const event of events) {
        const pointsMap = await loadEventPointsMap(event.csv);

        const teamScores = teams.map(team => {
          const playerScores = team.players.map(pdga => Number(pointsMap.get(pdga) || 0));
          const counted = [...playerScores].sort((a,b) => b-a).slice(0, 5);
          return {
            name: team.name,
            seasonEventId: String(event.id || '').toUpperCase(),
            countedTotal: sum(counted),
            rawTotal: sum(playerScores)
          };
        });

        teamScores.sort((a,b) => (
          b.countedTotal - a.countedTotal ||
          b.rawTotal - a.rawTotal ||
          a.name.localeCompare(b.name)
        ));

        const winner = teamScores[0];
        const team = teams.find(t => t.name === winner.name);
        if (team) {
          team.trophies.push({
            eventId: winner.seasonEventId,
            score: winner.countedTotal,
            team: team.name
          });
        }
      }

      teams.sort((a,b) => (
        b.trophies.length - a.trophies.length ||
        a.name.localeCompare(b.name)
      ));

      return { teams, eventCount: events.length };
    }

    function render(data){
      const shelves = document.getElementById('shelves');
      const footer = document.getElementById('footer');
      const allScores = data.teams.flatMap(t => t.trophies.map(x => x.score));
      const minScore = allScores.length ? Math.min(...allScores) : 0;
      const maxScore = allScores.length ? Math.max(...allScores) : 1;

      shelves.innerHTML = data.teams.map(team => {
        const countText = `${team.trophies.length} ${team.trophies.length === 1 ? 'Trophy' : 'Trophies'}`;
        const trophiesHtml = team.trophies.length
          ? team.trophies.map(item => {
              const vars = trophyVars(item, minScore, maxScore);
              const handleMode = pick(buildVariantKey(item.team, item.eventId) + 'hm', ['both', 'left', 'right', 'none']);
              const leftHandle = handleMode === 'both' || handleMode === 'left';
              const rightHandle = handleMode === 'both' || handleMode === 'right';
              return `
                <div class="trophy" style="${styleObjectToCssText(vars)}" data-tooltip="Score: ${escapeHtml(item.score)}" title="Score: ${escapeHtml(item.score)}">
                  <div class="trophy-topper"></div>
                  <div class="trophy-cup-wrap">
                    ${leftHandle ? '<span class="trophy-handle left"></span>' : ''}
                    <div class="trophy-cup"></div>
                    ${rightHandle ? '<span class="trophy-handle right"></span>' : ''}
                  </div>
                  <div class="trophy-stem"></div>
                  <div class="trophy-neck"></div>
                  <div class="trophy-base-top"></div>
                  <div class="trophy-base"></div>
                  <div class="trophy-plaque">${escapeHtml(item.eventId)}</div>
                </div>`;
            }).join('')
          : '<div class="no-trophies">No event wins yet</div>';

        return `
          <article class="card team-card">
            <div class="team-head">
              <h3 class="team-name">${escapeHtml(team.name)}</h3>
              <div class="team-meta">${countText}</div>
            </div>
            <div class="shelf-zone">
              <div class="shelf-scroll">
                <div class="shelf-inner">
                  <div class="trophy-row">${trophiesHtml}</div>
                  <div class="shelf-board"></div>
                </div>
              </div>
            </div>
          </article>`;
      }).join('');

      footer.textContent = `Showing ${data.eventCount} event${data.eventCount === 1 ? '' : 's'} in the 2026 season.`;
    }

    async function init(){
      try {
        const data = await computeTrophyData();
        render(data);
      } catch (err) {
        document.getElementById('shelves').innerHTML = `
          <div class="card team-card">
            <div class="team-name">Trophy Room</div>
            <p class="muted" style="margin:8px 0 0;">${escapeHtml(err?.message || 'Unable to load trophy room.')}</p>
          </div>`;
        document.getElementById('footer').textContent = 'Check your data and file paths.';
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
