
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Mediocre Disc Golf Fantasy League — Rosters</title>
  <link rel="stylesheet" href="assets/style.css" />

  <style>
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }
    .toolbar-left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .toolbar-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    .btn{
      appearance:none;
      border:1px solid var(--line, rgba(255,255,255,.14));
      background:rgba(255,255,255,.04);
      color:var(--text, #eef2ff);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font:inherit;
      font-weight:700;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .btn:hover{ transform:translateY(-1px); background:rgba(255,255,255,.07); }
    .btn.primary{ background:rgba(245,197,66,.12); border-color:rgba(245,197,66,.45); }
    .btn.danger{ background:rgba(255,106,106,.10); border-color:rgba(255,106,106,.35); }

    .save-pill{
      display:inline-flex;
      align-items:center;
      border:1px solid var(--line, rgba(255,255,255,.14));
      border-radius:999px;
      padding:8px 12px;
      font-size:.92rem;
    }

    .controls-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:14px;
    }
    .controls-grid .full{ grid-column:1 / -1; }
    @media (max-width: 980px){ .controls-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (max-width: 640px){ .controls-grid{ grid-template-columns:1fr; } }

    .field label{
      display:block;
      margin:0 0 6px;
      font-size:.85rem;
      color:var(--muted, #aab3c5);
    }
    .field input, .field select{
      width:100%;
      border:1px solid var(--line, rgba(255,255,255,.14));
      background:rgba(8,12,20,.55);
      color:var(--text, #eef2ff);
      padding:10px 12px;
      border-radius:12px;
      font:inherit;
    }
    .field input:focus, .field select:focus{
      outline:none;
      border-color:rgba(245,197,66,.55);
      box-shadow:0 0 0 3px rgba(245,197,66,.12);
    }

    .teams{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
      margin-top:16px;
    }
    @media (max-width: 980px){ .teams{ grid-template-columns:1fr; } }

    .team-card{ overflow:hidden; }
    .team-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      border-bottom:1px solid var(--line, rgba(255,255,255,.14));
      background:rgba(255,255,255,.03);
      flex-wrap:wrap;
    }
    .team-head-left{ display:flex; align-items:center; gap:10px; flex:1; min-width:240px; }
    .team-index{
      width:34px; height:34px; border-radius:999px; display:grid; place-items:center;
      font-weight:800; background:rgba(245,197,66,.12); border:1px solid rgba(245,197,66,.35);
      color:var(--gold, #f5c542); flex:0 0 auto;
    }
    .team-name{ font-weight:800; }
    .team-body{ padding:16px; display:grid; gap:12px; }
    .slot{ display:grid; grid-template-columns:64px 1fr; gap:10px; align-items:center; }
    .slot-label{ color:var(--muted, #aab3c5); font-size:.9rem; }

    .muted-block{ color:var(--muted, #aab3c5); }
    code{ background:rgba(255,255,255,.06); padding:.12rem .35rem; border-radius:6px; }
  </style>
</head>
<body>
  <nav class="subnav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="standings.html" class="nav-link">Standings</a>
    <a href="stats.html" class="nav-link">Stats</a>
    <a href="rosters.html" class="nav-link">Rosters</a>
  </nav>

  <div class="wrap">
    <header class="header">
      <img class="logo-img" src="assets/logo.png" alt="The Mediocre Disc Golf Fantasy League logo">
      <div>
        <h1>The Mediocre Disc Golf Fantasy League • 2026</h1>
        <p class="muted">Manage team names and player assignments.</p>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-left">
        <div id="savePill" class="save-pill">Not saved yet</div>
      </div>
      <div class="toolbar-right">
        <button id="loadBtn" class="btn">Reload Local</button>
        <button id="loadGhBtn" class="btn">Load from GitHub</button>
        <button id="saveGhBtn" class="btn primary">Save to GitHub</button>
        <button id="clearBtn" class="btn danger">Clear Local</button>
        <button id="buildBtn" class="btn">Build Teams</button>
      </div>
    </div>

    <section class="card" style="padding:18px;">
      <div class="controls-grid">
        <div class="field">
          <label for="playersCsv">Players CSV path</label>
          <input id="playersCsv" type="text" value="data/players.csv" />
        </div>
        <div class="field">
          <label for="numTeams">Number of teams</label>
          <input id="numTeams" type="number" min="2" max="50" value="8" />
        </div>
        <div class="field">
          <label for="playersPerTeam">Players per team</label>
          <input id="playersPerTeam" type="number" min="1" max="20" value="6" />
        </div>
        <div class="field">
          <label for="storageKey">Storage key</label>
          <input id="storageKey" type="text" value="rosters:v1" />
        </div>

        <div class="field">
          <label for="ghOwner">GitHub owner</label>
          <input id="ghOwner" type="text" placeholder="your-org-or-username" />
        </div>
        <div class="field">
          <label for="ghRepo">GitHub repo</label>
          <input id="ghRepo" type="text" placeholder="your-repo-name" />
        </div>
        <div class="field">
          <label for="ghBranch">GitHub branch</label>
          <input id="ghBranch" type="text" value="main" />
        </div>
        <div class="field">
          <label for="ghPath">Rosters JSON path in repo</label>
          <input id="ghPath" type="text" value="data/rosters.json" />
        </div>
        <div class="field full">
          <label for="ghToken">GitHub token (fine-grained, contents: read/write)</label>
          <input id="ghToken" type="password" placeholder="Paste token (stored locally only)" />
        </div>
      </div>
      <p class="muted muted-block" style="margin:14px 0 0;">
        Tip: keep the <b>Storage key</b> stable (for example <code>rosters:2026</code>) for local use. For cross-device sync, configure GitHub and save to <code>data/rosters.json</code>.
      </p>
    </section>

    <div id="teams" class="teams"></div>

    <footer class="muted footer" id="footer"></footer>
  </div>

<script>
    (function(){
      const links = document.querySelectorAll(".nav-link");
      links.forEach(link => {
        const here = location.pathname.split("/").pop() || "index.html";
        const target = (link.getAttribute("href") || "").split("/").pop();
        if (target === here) link.classList.add("active");
      });
    })();

    // ---------- CSV parsing ----------
    function parseCsv(text) {
      // Minimal CSV parser (handles commas + quoted fields)
      const rows = [];
      let row = [];
      let cur = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (c === '"' && inQuotes && next === '"') { cur += '"'; i++; continue; }
        if (c === '"') { inQuotes = !inQuotes; continue; }

        if (!inQuotes && c === ",") { row.push(cur); cur = ""; continue; }
        if (!inQuotes && (c === "\n" || c === "\r")) {
          if (c === "\r" && next === "\n") i++;
          row.push(cur); cur = "";
          if (row.some(v => v.trim() !== "")) rows.push(row);
          row = [];
          continue;
        }
        cur += c;
      }
      row.push(cur);
      if (row.some(v => v.trim() !== "")) rows.push(row);
      return rows;
    }

    async function loadPlayers(csvPath) {
      const res = await fetch(csvPath, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to load ${csvPath} (${res.status})`);
      const text = await res.text();
      const rows = parseCsv(text);
      if (!rows.length) throw new Error("Empty players.csv");

      const header = rows[0].map(h => h.trim().toLowerCase());
      const idxName = header.findIndex(h => h === "player" || h === "name");
      const idxPdga = header.findIndex(h => h === "pdga");

      if (idxName < 0 || idxPdga < 0) {
        throw new Error(`players.csv must have headers: Player,PDGA`);
      }

      const players = rows.slice(1)
        .map(r => ({
          player: (r[idxName] ?? "").trim(),
          pdga: (r[idxPdga] ?? "").trim()
        }))
        .filter(p => p.player && p.pdga);

      // Sort by name for dropdown UX
      players.sort((a,b) => a.player.localeCompare(b.player));
      return players;
    }


    // ---------- GitHub sync (optional) ----------
    // This writes rosters to a JSON file in your GitHub repo using the GitHub Contents API.
    // You provide a fine-grained PAT (contents: read/write). The token is stored in localStorage only on this device.
    // Any device that knows the repo + path and has a token can load/save the same rosters file.
    //
    // Endpoint: PUT /repos/{owner}/{repo}/contents/{path}
    // Docs: https://docs.github.com/en/rest/repos/contents?apiVersion=2022-11-28

    const GH_TOKEN_KEY = "ghToken:v1";

    function getGhCfg() {
      const owner = document.getElementById("ghOwner").value.trim();
      const repo = document.getElementById("ghRepo").value.trim();
      const branch = document.getElementById("ghBranch").value.trim() || "main";
      const path = document.getElementById("ghPath").value.trim() || "data/rosters.json";
      const token = (document.getElementById("ghToken").value || "").trim();
      return { owner, repo, branch, path, token };
    }

    function ghHeaders(token) {
      return {
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
        "Authorization": `Bearer ${token}`
      };
    }

    function b64EncodeUnicode(str) {
      // UTF-8 safe base64
      const bytes = new TextEncoder().encode(str);
      let binary = "";
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary);
    }

    function b64DecodeUnicode(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array([...binary].map(ch => ch.charCodeAt(0)));
      return new TextDecoder().decode(bytes);
    }

    async function ghGetFile({ owner, repo, path, branch, token }) {
      const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${path}?ref=${encodeURIComponent(branch)}`;
      const res = await fetch(url, { headers: ghHeaders(token), cache: "no-store" });
      if (res.status === 404) return null;
      if (!res.ok) throw new Error(`GitHub load failed (${res.status})`);
      const data = await res.json();
      if (!data?.content) throw new Error("GitHub response missing content");
      const text = b64DecodeUnicode(data.content.replace(/\n/g, ""));
      return { text, sha: data.sha };
    }

    async function ghPutFile({ owner, repo, path, branch, token }, jsonText, sha) {
      const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${path}`;
      const body = {
        message: `Update rosters (${new Date().toISOString()})`,
        content: b64EncodeUnicode(jsonText),
        branch
      };
      if (sha) body.sha = sha;

      const res = await fetch(url, {
        method: "PUT",
        headers: { ...ghHeaders(token), "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        let msg = `GitHub save failed (${res.status})`;
        try {
          const j = await res.json();
          if (j?.message) msg += ` — ${j.message}`;
        } catch {}
        throw new Error(msg);
      }
      return await res.json();
    }

    function loadGhTokenIntoInput() {
      const t = localStorage.getItem(GH_TOKEN_KEY);
      if (t) document.getElementById("ghToken").value = t;
    }

    function persistGhTokenFromInput() {
      const t = (document.getElementById("ghToken").value || "").trim();
      if (!t) { localStorage.removeItem(GH_TOKEN_KEY); return; }
      localStorage.setItem(GH_TOKEN_KEY, t);
    }


    // ---------- localStorage schema ----------
    // {
    //   version: 1,
    //   updatedAt: ISO,
    //   numTeams: number,
    //   playersPerTeam: number,
    //   teams: [{ name: string, players: [{player,pdga}] }]
    // }

    function nowIso() { return new Date().toISOString(); }

    function setPill(text, ok=false) {
      const pill = document.getElementById("savePill");
      pill.textContent = text;
      pill.style.borderColor = ok ? "rgba(245,197,66,.45)" : "var(--line, rgba(255,255,255,.14))";
      pill.style.background = ok ? "rgba(245,197,66,.12)" : "rgba(255,255,255,.03)";
      pill.style.color = ok ? "var(--text, #eef2ff)" : "var(--muted, #aab3c5)";
    }

    function getKey() {
      return document.getElementById("storageKey").value.trim() || "rosters:v1";
    }

    function readSaved() {
      const key = getKey();
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }

    function writeSaved(data) {
      const key = getKey();
      localStorage.setItem(key, JSON.stringify(data));
      setPill(`Saved • ${new Date().toLocaleString()}`, true);
    }

    function clearSaved() {
      const key = getKey();
      localStorage.removeItem(key);
      setPill("Cleared", false);
    }

    // ---------- UI build ----------
    let PLAYERS = [];
    const teamsEl = document.getElementById("teams");

    function makePlayerOptions(selectedPdga="") {
      // First option blank
      const frag = document.createDocumentFragment();
      const opt0 = document.createElement("option");
      opt0.value = "";
      opt0.textContent = "— Select player —";
      frag.appendChild(opt0);

      for (const p of PLAYERS) {
        const opt = document.createElement("option");
        opt.value = p.pdga;
        opt.textContent = `${p.player} (${p.pdga})`;
        if (p.pdga === selectedPdga) opt.selected = true;
        frag.appendChild(opt);
      }
      return frag;
    }

    function collectRosterFromUI() {
      const numTeams = Number(document.getElementById("numTeams").value);
      const playersPerTeam = Number(document.getElementById("playersPerTeam").value);

      const teams = [];
      for (let t = 0; t < numTeams; t++) {
        const teamCard = document.querySelector(`[data-team="${t}"]`);
        if (!teamCard) continue;

        const name = teamCard.querySelector("input[data-teamname]").value.trim() || `Team ${t+1}`;
        const players = [];

        for (let s = 0; s < playersPerTeam; s++) {
          const sel = teamCard.querySelector(`select[data-slot="${s}"]`);
          const pdga = (sel?.value ?? "").trim();
          if (!pdga) { players.push({ player:"", pdga:"" }); continue; }
          const match = PLAYERS.find(p => p.pdga === pdga);
          players.push(match ? { player: match.player, pdga: match.pdga } : { player:"", pdga });
        }
        teams.push({ name, players });
      }

      return {
        version: 1,
        updatedAt: nowIso(),
        numTeams,
        playersPerTeam,
        teams
      };
    }

    function saveFromUI() {
      const data = collectRosterFromUI();
      writeSaved(data);
    }

    function buildTeamsUI({ numTeams, playersPerTeam, seed=null }) {
      teamsEl.innerHTML = "";

      for (let t = 0; t < numTeams; t++) {
        const team = document.createElement("div");
        team.className = "card team-card";
        team.dataset.team = String(t);

        const teamName = seed?.teams?.[t]?.name || `Team ${t+1}`;

        team.innerHTML = `
          <div class="team-head">
            <div class="team-head-left">
              <div class="team-index">${t+1}</div>
              <input class="team-name" type="text" data-teamname value="${escapeHtml(teamName)}" />
            </div>
            <div class="muted">Autosave on</div>
          </div>
          <div class="team-body"></div>
        `;

        const body = team.querySelector(".team-body");

        for (let s = 0; s < playersPerTeam; s++) {
          const slot = document.createElement("div");
          slot.className = "slot";

          const selectedPdga = seed?.teams?.[t]?.players?.[s]?.pdga || "";

          slot.innerHTML = `
            <div class="slot-label">P${s+1}</div>
            <select data-slot="${s}"></select>
          `;

          const sel = slot.querySelector("select");
          sel.appendChild(makePlayerOptions(selectedPdga));

          // save on change
          sel.addEventListener("change", saveFromUI);
          body.appendChild(slot);
        }

        // save when team name changes
        team.querySelector("input[data-teamname]").addEventListener("input", debounce(saveFromUI, 250));

        teamsEl.appendChild(team);
      }
    }

    // ---------- helpers ----------
    function debounce(fn, ms) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), ms);
      };
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // ---------- actions ----------
    async function init(loadSaved=true) {
      loadGhTokenIntoInput();

      setPill("Loading players…", false);

      const csvPath = document.getElementById("playersCsv").value.trim();
      PLAYERS = await loadPlayers(csvPath);

      const numTeams = Number(document.getElementById("numTeams").value);
      const playersPerTeam = Number(document.getElementById("playersPerTeam").value);

      let seed = null;
      if (loadSaved) seed = readSaved();

      if (seed && seed.numTeams && seed.playersPerTeam) {
        // if saved config differs, mirror it so UI matches
        document.getElementById("numTeams").value = seed.numTeams;
        document.getElementById("playersPerTeam").value = seed.playersPerTeam;
        buildTeamsUI({ numTeams: seed.numTeams, playersPerTeam: seed.playersPerTeam, seed });
        setPill(`Loaded saved • ${new Date(seed.updatedAt).toLocaleString()}`, true);
        document.getElementById("footer").textContent = `Loaded ${seed.numTeams} team(s) • ${seed.playersPerTeam} player slots`;
      } else {
        buildTeamsUI({ numTeams, playersPerTeam, seed: null });
        setPill("Ready (nothing saved yet)", false);
        document.getElementById("footer").textContent = `Loaded ${numTeams} team(s) • ${playersPerTeam} player slots`;
      }

      // Save immediately after build so a blank structure exists (optional)
      // saveFromUI();
    }

    document.getElementById("buildBtn").addEventListener("click", async () => {
      await init(false);
      saveFromUI(); // persist the new structure
    });

    document.getElementById("loadBtn").addEventListener("click", async () => {
      await init(true);
    });

    document.getElementById("loadGhBtn").addEventListener("click", async () => {
      try {
        persistGhTokenFromInput();
        setPill("Loading from GitHub…", false);
        const cfg = getGhCfg();
        if (!cfg.owner || !cfg.repo || !cfg.path) throw new Error("Enter GitHub owner, repo, and path.");
        if (!cfg.token) throw new Error("Enter a GitHub token (fine‑grained PAT).");

        const file = await ghGetFile(cfg);
        if (!file) throw new Error("No rosters file found at that path (404). Save once to create it.");

        const seed = JSON.parse(file.text);
        // mirror saved config into UI
        if (seed?.numTeams) document.getElementById("numTeams").value = seed.numTeams;
        if (seed?.playersPerTeam) document.getElementById("playersPerTeam").value = seed.playersPerTeam;

        buildTeamsUI({ numTeams: Number(document.getElementById("numTeams").value), playersPerTeam: Number(document.getElementById("playersPerTeam").value), seed });
        // also store locally (so it works offline)
        writeSaved(seed);
        setPill(`Loaded from GitHub • ${new Date(seed.updatedAt || Date.now()).toLocaleString()}`, true);
        document.getElementById("footer").textContent = `Loaded ${seed.numTeams} team(s) • ${seed.playersPerTeam} player slots`;
      } catch (err) {
        console.error(err);
        setPill(`Error: ${err.message}`, false);
      }
    });

    document.getElementById("saveGhBtn").addEventListener("click", async () => {
      try {
        persistGhTokenFromInput();
        setPill("Saving to GitHub…", false);
        const cfg = getGhCfg();
        if (!cfg.owner || !cfg.repo || !cfg.path) throw new Error("Enter GitHub owner, repo, and path.");
        if (!cfg.token) throw new Error("Enter a GitHub token (fine‑grained PAT).");

        const data = collectRosterFromUI();
        // always keep local in sync too
        writeSaved(data);

        // fetch existing sha (if any), then put
        const existing = await ghGetFile(cfg);
        const jsonText = JSON.stringify(data, null, 2);
        await ghPutFile(cfg, jsonText, existing?.sha);

        setPill(`Saved to GitHub • ${new Date().toLocaleString()}`, true);
      } catch (err) {
        console.error(err);
        setPill(`Error: ${err.message}`, false);
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      clearSaved();
      document.getElementById("footer").textContent = "Local roster data cleared";
    });

    // If player CSV path or storageKey changes, re-init (so it can load correct dataset)
    document.getElementById("playersCsv").addEventListener("change", () => init(true));
    document.getElementById("storageKey").addEventListener("change", () => init(true));
    document.getElementById("ghToken").addEventListener("change", () => persistGhTokenFromInput());

    // First load
    init(true).catch(err => {
      console.error(err);
      setPill(`Error: ${err.message}`, false);
      teamsEl.innerHTML = `<div class="card" style="padding:16px;">
        <b>Could not load players</b><div style="color:var(--muted);margin-top:6px">${escapeHtml(err.message)}</div>
        <div style="color:var(--muted);margin-top:10px">Check that <code>data/players.csv</code> exists and has headers <code>Player,PDGA</code>.</div>
      </div>`;
    });
  </script>
</body>
</html>
