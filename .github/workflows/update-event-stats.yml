name: Update Event Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run stats script
        run: python scripts/eventstats.py

      - name: Check generated files
        run: |
          echo "Repo root:"
          pwd
          echo "data folder:"
          ls -la data || true
          echo "data/stats folder:"
          ls -la data/stats || true
          echo "find csv files:"
          find . -name "*.csv"

      - name: Commit generated stats
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/stats || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update event stats"
            git push
          fi
