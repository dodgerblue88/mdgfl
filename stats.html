
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Mediocre Disc Golf Fantasy League — 2026</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    :root {
      --mdgfl-gold: #f5c542;
      --mdgfl-green: #6fbf4b;
      --mdgfl-yellow: #f5c542;
    }

    .stats-wrap {
      display: grid;
      gap: 18px;
    }
  </style>
</head>
<body>
  <nav class="subnav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="standings.html" class="nav-link">Standings</a>
    <a href="stats.html" class="nav-link active">Stats</a>
  </nav>

  <div class="wrap stats-wrap">
    <header class="header card">
      <img class="logo-img" src="assets/logo.png" alt="The Mediocre Disc Golf Fantasy League logo">
      <div>
        <h1>The Mediocre Disc Golf Fantasy League • 2026</h1>
      </div>
    </header>

    <div class="bar card">
      <div class="bar-left">
        <label class="muted" for="eventSelect">View:</label>
        <select id="eventSelect"></select>
        <input id="searchInput" placeholder="Search player…" />
      </div>
      <div class="bar-right">
        <button id="refreshBtn">Refresh</button>
        <button id="downloadBtn">Download CSV</button>
      </div>
    </div>

    <div class="card table-wrap">
      <table id="statsTable">
        <thead id="thead"></thead>
        <tbody id="tbody">
          <tr><td class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <footer class="muted footer" id="footer"></footer>
  </div>

  <script>
    (function(){
      const links = document.querySelectorAll('.nav-link');
      const here = location.pathname.split('/').pop() || 'index.html';
      links.forEach(link => {
        const target = (link.getAttribute('href') || '').split('/').pop();
        if (target === here) link.classList.add('active');
        else link.classList.remove('active');
      });
    })();
  </script>
  <script src="assets/app.js"></script>
</body>
</html>
